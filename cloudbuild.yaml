timeout: 2700s
steps:
  - name: "gcr.io/k8s-staging-test-infra/gcb-docker-gcloud"
    entrypoint: "make"
    args:
      - "docker-buildx"
      - "IMAGE_TAG_BASE=${_IMAGE_PREFIX}/mcp-lifecycle-operator"
      - "IMAGE_TAG=$$(GIT_IMAGE_TAG)"
      - "EXTRA_TAGS=${_GIT_TAG}-${_CONFIG} latest-${_CONFIG}"

options:
  enableStructuredLogging: true
  # Using a more powerful machine type can speed up docker builds.
  machineType: "E2_HIGHCPU_8"
  substitution_option: "ALLOW_LOOSE"
substitutions:
  _GIT_TAG: "12345"
  _CONFIG: main
  _IMAGE_PREFIX: "us-central1-docker.pkg.dev/k8s-staging-images/mcp-lifecycle-operator"
